services:
  broker:
    image: eclipse-mosquitto:2
    container_name: mqtt-broker
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

  app:
    build: .
    environment:
      MQTT_URL: mqtt://broker:1883
    depends_on:
      - broker
    profiles:
      - app

volumes:
  mosquitto_data:
  mosquitto_log:
